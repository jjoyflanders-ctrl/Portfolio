<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.stage{
padding:100px 20px;
display:flex;
justify-content:center;
}

.flip-shell{
width:min(96vw,1200px);
background:rgba(255,255,255,.04);
border-radius:20px;
padding:40px;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.book-frame{
width:100%;
height:700px;
position:relative;
perspective:1800px;
display:flex;
justify-content:center;
align-items:center;
}

/* flipbook */
#flipbook{
width:100%;
height:100%;
position:relative;
z-index:2;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

/* fake cover animation */
.book-cover-tease{
position:absolute;
inset:0;
z-index:10;
pointer-events:none;
transform-origin:left center;
opacity:0;
}

.book-cover-tease img{
width:100%;
height:100%;
object-fit:contain;
filter:drop-shadow(0 18px 28px rgba(0,0,0,.3));
}

.book-cover-tease.teasing{
opacity:1;
animation:coverOpen 2.8s ease-in-out infinite;
}

@keyframes coverOpen{
0%,100%{
transform:perspective(1800px) rotateY(0deg);
}

35%{
transform:perspective(1800px) rotateY(-22deg);
}

60%{
transform:perspective(1800px) rotateY(-10deg);
}
}

/* hint text */

.flip-hint{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:12px;
letter-spacing:.15em;
text-transform:uppercase;
opacity:.6;
animation:fadeHint 2s infinite;
}

.flip-hint.hidden{
opacity:0;
}

@keyframes fadeHint{
0%,100%{opacity:.3}
50%{opacity:.9}
}

</style>
</head>

<body>

<div style="height:800px"></div>

<div class="stage">

<div class="flip-shell" id="flipShell">

<div class="book-frame">

<div class="book-cover-tease" id="bookCover">
<img src="pages/page-01.jpg">
</div>

<div id="flipbook">

<div class="page"><img src="pages/page-01.jpg"></div>
<div class="page"><img src="pages/page-02.jpg"></div>
<div class="page"><img src="pages/page-03.jpg"></div>
<div class="page"><img src="pages/page-04.jpg"></div>
<div class="page"><img src="pages/page-05.jpg"></div>
<div class="page"><img src="pages/page-06.jpg"></div>
<div class="page"><img src="pages/page-07.jpg"></div>
<div class="page"><img src="pages/page-08.jpg"></div>

</div>

</div>

<div class="flip-hint" id="flipHint">
Drag corner or use arrows to flip
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const flipbook=document.getElementById("flipbook");
const flipShell=document.getElementById("flipShell");
const cover=document.getElementById("bookCover");
const hint=document.getElementById("flipHint");

let started=false;
let interacted=false;

const pageFlip=new St.PageFlip(flipbook,{
width:600,
height:776,
size:"stretch",
showCover:true,
autoSize:true
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

function startTease(){
if(started||interacted)return;
started=true;
cover.classList.add("teasing");
}

function stopTease(){
interacted=true;
cover.classList.remove("teasing");
hint.classList.add("hidden");
}

flipShell.addEventListener("pointerdown",stopTease);
pageFlip.on("flip",stopTease);

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
startTease();
observer.disconnect();
}
});
},{threshold:.4});

observer.observe(flipShell);

</script>

</body>
</html>
