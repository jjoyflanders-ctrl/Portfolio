<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>J² Designs | Kenowa Hills PBIS Flipbook</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background: radial-gradient(circle at top, rgba(55,55,55,.95) 0%, rgba(17,17,17,.98) 42%, rgba(5,5,5,1) 100%);
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("https://www.transparenttextures.com/patterns/brick-wall.png");
  background-repeat: repeat;
  opacity: .30;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 18%, rgba(255,255,255,.06) 0%, rgba(255,255,255,.02) 22%, rgba(255,255,255,0) 52%);
  pointer-events: none;
  z-index: 0;
}
.corner-logo {
  position: fixed;
  right: 28px;
  bottom: 22px;
  width: 115px;
  opacity: .60;
  filter: drop-shadow(0 0 12px rgba(255,255,255,.10));
  pointer-events: none;
  z-index: 1;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  padding: 16px 24px;
  background: rgba(0,0,0,.70);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,.10);
}
.title-wrap h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: .04em;
  font-weight: 600;
  color: #00bf63;
  text-shadow: 0 0 8px rgba(0,191,99,.22);
}
.title-wrap p {
  margin: 4px 0 0;
  color: rgba(255,255,255,.72);
  font-size: 14px;
}
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
button,
.control-link {
  background: rgba(25,25,25,.96);
  color: white;
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
button:hover,
.control-link:hover {
  transform: translateY(-1px);
  background: rgba(35,35,35,.98);
  border-color: rgba(255,255,255,.28);
  box-shadow: 0 0 16px rgba(255,255,255,.06);
}
.stage {
  position: relative;
  flex: 1;
  display: grid;
  place-items: center;
  padding: 26px 16px 36px;
  z-index: 5;
}
.flip-shell {
  position: relative;
  z-index: 5;
  width: min(96vw, 1400px);
  height: min(78vh, 950px);
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 26px;
  box-shadow:
    0 30px 80px rgba(0,0,0,.52),
    0 0 40px rgba(255,255,255,.06);
  display: grid;
  place-items: center;
  padding: 18px;
}
.flip-shell::before {
  content: "";
  position: absolute;
  inset: 6% 10%;
  background: radial-gradient(circle, rgba(255,255,255,.08) 0%, rgba(255,255,255,.03) 28%, rgba(255,255,255,0) 68%);
  filter: blur(22px);
  z-index: 0;
  pointer-events: none;
}
#flipbook {
  width: min(92vw, 1280px);
  height: min(72vh, 860px);
  position: relative;
  z-index: 2;
}
.page { background: #fff; }
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  user-select: none;
  pointer-events: none;
}
.footer {
  display: flex;
  justify-content: center;
  padding: 20px;
  opacity: .72;
  z-index: 5;
  position: relative;
  font-size: 14px;
  color: rgba(255,255,255,.78);
}
@media (max-width: 900px) {
  .topbar {
    padding: 14px 16px;
    align-items: flex-start;
    flex-direction: column;
  }
  .flip-shell {
    width: 100vw;
    height: auto;
    min-height: 74vh;
    border-radius: 0;
    border-left: 0;
    border-right: 0;
    padding: 14px;
  }
  #flipbook {
    width: min(95vw, 700px);
    height: min(70vh, 760px);
  }
  .corner-logo {
    width: 48px;
    right: 14px;
    bottom: 12px;
    opacity: .50;
  }
}
</style>
</head>
<body>
<img src="Copy of J Squared.svg" class="corner-logo" alt="">
<div class="topbar">
  <div class="title-wrap">
    <h1>J² Designs | Kenowa Hills PBIS</h1>
    <p>12-page flipbook</p>
  </div>
  <div class="controls">
    <button id="prevBtn">◀ Previous</button>
    <button id="nextBtn">Next ▶</button>
    <button id="fsBtn">Fullscreen</button>
    <a class="control-link" href="../Kenowa Hills PBIS Portfolio-2.pdf" download>Download PDF</a>
  </div>
</div>
<div class="stage">
  <div class="flip-shell">
    <div id="flipbook">
      <div class="page" data-density="hard"><img src="pages/page-01.jpg" alt="J² Designs | Kenowa Hills PBIS page 1"></div>
      <div class="page"><img src="pages/page-02.jpg" alt="J² Designs | Kenowa Hills PBIS page 2"></div>
      <div class="page"><img src="pages/page-03.jpg" alt="J² Designs | Kenowa Hills PBIS page 3"></div>
      <div class="page"><img src="pages/page-04.jpg" alt="J² Designs | Kenowa Hills PBIS page 4"></div>
      <div class="page"><img src="pages/page-05.jpg" alt="J² Designs | Kenowa Hills PBIS page 5"></div>
      <div class="page"><img src="pages/page-06.jpg" alt="J² Designs | Kenowa Hills PBIS page 6"></div>
      <div class="page"><img src="pages/page-07.jpg" alt="J² Designs | Kenowa Hills PBIS page 7"></div>
      <div class="page"><img src="pages/page-08.jpg" alt="J² Designs | Kenowa Hills PBIS page 8"></div>
      <div class="page"><img src="pages/page-09.jpg" alt="J² Designs | Kenowa Hills PBIS page 9"></div>
      <div class="page"><img src="pages/page-10.jpg" alt="J² Designs | Kenowa Hills PBIS page 10"></div>
      <div class="page"><img src="pages/page-11.jpg" alt="J² Designs | Kenowa Hills PBIS page 11"></div>
      <div class="page" data-density="hard"><img src="pages/page-12.jpg" alt="J² Designs | Kenowa Hills PBIS page 12"></div>
    </div>
  </div>
</div>
<div class="footer">Drag the page corners or use the buttons to flip</div>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<script>
const pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
  width: 600,
  height: 776,
  size: "stretch",
  minWidth: 280,
  maxWidth: 1200,
  minHeight: 360,
  maxHeight: 1552,
  maxShadowOpacity: 0.45,
  showCover: true,
  mobileScrollSupport: false,
  usePortrait: true,
  autoSize: true,
  startZIndex: 10,
  flippingTime: 900,
  drawShadow: true,
  clickEventForward: true
});
pageFlip.loadFromHTML(document.querySelectorAll(".page"));
document.getElementById("prevBtn").addEventListener("click", () => pageFlip.flipPrev());
document.getElementById("nextBtn").addEventListener("click", () => pageFlip.flipNext());
document.getElementById("fsBtn").addEventListener("click", async () => {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    await el.requestFullscreen?.();
  } else {
    await document.exitFullscreen?.();
  }
});
</script>
</body>
</html>
