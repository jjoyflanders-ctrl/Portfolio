<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Highlight Industries Portfolio Flipbook</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(circle at top, #2b2b2b 0%, #111 45%, #050505 100%);
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/brick-wall.png");
    opacity: .13;
    pointer-events: none;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: rgba(0,0,0,.72);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .title-wrap h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 30px);
    letter-spacing: .04em;
  }
  .title-wrap p {
    margin: 4px 0 0;
    color: rgba(255,255,255,.72);
    font-size: 14px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    background: #191919;
    color: white;
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: transform .2s ease, background .2s ease, border-color .2s ease;
  }
  button:hover { transform: translateY(-1px); background: #232323; border-color: rgba(255,255,255,.28); }
  .stage {
    position: relative;
    flex: 1;
    display: grid;
    place-items: center;
    padding: 26px 16px 36px;
  }
  .flip-shell {
    width: min(96vw, 1400px);
    height: min(78vh, 950px);
    background: rgba(255,255,255,.035);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 26px;
    box-shadow: 0 24px 70px rgba(0,0,0,.45);
    display: grid;
    place-items: center;
    padding: 18px;
  }
  #flipbook {
    width: min(92vw, 1280px);
    height: min(72vh, 860px);
  }
  .page {
    background: #fff;
  }
  .page img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
    pointer-events: none;
  }
  .footer {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    padding: 0 16px 28px;
    color: rgba(255,255,255,.75);
    font-size: 14px;
  }
  .hint {
    color: rgba(255,255,255,.55);
    text-align: center;
    padding-bottom: 18px;
    font-size: 13px;
  }
  @media (max-width: 900px) {
    .topbar { padding: 14px 16px; align-items: flex-start; gap: 14px; flex-direction: column; }
    .flip-shell { width: 100vw; height: auto; min-height: 74vh; border-radius: 0; border-left: 0; border-right: 0; }
    #flipbook { width: min(95vw, 700px); height: min(70vh, 760px); }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="title-wrap">
      <h1>Highlight Industries Portfolio</h1>
      <p>16-page flipbook viewer</p>
    </div>
    <div class="controls">
      <button id="prevBtn">◀ Previous</button>
      <button id="nextBtn">Next ▶</button>
      <button id="fsBtn">Fullscreen</button>
    </div>
  </div>

  <div class="stage">
    <div class="flip-shell">
      <div id="flipbook">
        <div class="page" data-density="hard"><img src="pages/page-01.jpg" alt="Highlight Industries Portfolio page 1" /></div>
        <div class="page" data-density="soft"><img src="pages/page-02.jpg" alt="Highlight Industries Portfolio page 2" /></div>
        <div class="page" data-density="soft"><img src="pages/page-03.jpg" alt="Highlight Industries Portfolio page 3" /></div>
        <div class="page" data-density="soft"><img src="pages/page-04.jpg" alt="Highlight Industries Portfolio page 4" /></div>
        <div class="page" data-density="soft"><img src="pages/page-05.jpg" alt="Highlight Industries Portfolio page 5" /></div>
        <div class="page" data-density="soft"><img src="pages/page-06.jpg" alt="Highlight Industries Portfolio page 6" /></div>
        <div class="page" data-density="soft"><img src="pages/page-07.jpg" alt="Highlight Industries Portfolio page 7" /></div>
        <div class="page" data-density="soft"><img src="pages/page-08.jpg" alt="Highlight Industries Portfolio page 8" /></div>
        <div class="page" data-density="soft"><img src="pages/page-09.jpg" alt="Highlight Industries Portfolio page 9" /></div>
        <div class="page" data-density="soft"><img src="pages/page-10.jpg" alt="Highlight Industries Portfolio page 10" /></div>
        <div class="page" data-density="soft"><img src="pages/page-11.jpg" alt="Highlight Industries Portfolio page 11" /></div>
        <div class="page" data-density="soft"><img src="pages/page-12.jpg" alt="Highlight Industries Portfolio page 12" /></div>
        <div class="page" data-density="soft"><img src="pages/page-13.jpg" alt="Highlight Industries Portfolio page 13" /></div>
        <div class="page" data-density="soft"><img src="pages/page-14.jpg" alt="Highlight Industries Portfolio page 14" /></div>
        <div class="page" data-density="soft"><img src="pages/page-15.jpg" alt="Highlight Industries Portfolio page 15" /></div>
        <div class="page" data-density="hard"><img src="pages/page-16.jpg" alt="Highlight Industries Portfolio page 16" /></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="pageLabel">Page 1 of 16</span>
  </div>
  <div class="hint">Tip: drag a corner to curl a page, or use the buttons.</div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
  <script>
    const container = document.getElementById('flipbook');
    const pageLabel = document.getElementById('pageLabel');
    const pageCount = container.children.length;

    const pageFlip = new St.PageFlip(container, {
      width: 600,
      height: 776,
      size: 'stretch',
      minWidth: 280,
      maxWidth: 1200,
      minHeight: 360,
      maxHeight: 1552,
      maxShadowOpacity: 0.45,
      showCover: true,
      mobileScrollSupport: false,
      usePortrait: true,
      autoSize: true,
      startZIndex: 10,
      flippingTime: 900,
      drawShadow: true,
      clickEventForward: true
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.page'));

    function updateLabel() {
      const current = pageFlip.getCurrentPageIndex() + 1;
      pageLabel.textContent = `Page ${current} of ${pageCount}`;
    }

    document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
    document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());
    document.getElementById('fsBtn').addEventListener('click', async () => {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        await el.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    });

    pageFlip.on('flip', updateLabel);
    window.addEventListener('resize', () => updateLabel());
    updateLabel();
  </script>
</body>
</html>
